<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ff99"/>
    </marker>
    <marker id="arrow-ret" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="#0a0e1a"/>

  <!-- Grid lines -->
  <g stroke="#1a2040" stroke-width="1" opacity="0.5">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="0" y1="500" x2="900" y2="500"/>
    <line x1="0" y1="600" x2="900" y2="600"/>
    <line x1="100" y1="0" x2="100" y2="700"/>
    <line x1="200" y1="0" x2="200" y2="700"/>
    <line x1="300" y1="0" x2="300" y2="700"/>
    <line x1="400" y1="0" x2="400" y2="700"/>
    <line x1="500" y1="0" x2="500" y2="700"/>
    <line x1="600" y1="0" x2="600" y2="700"/>
    <line x1="700" y1="0" x2="700" y2="700"/>
    <line x1="800" y1="0" x2="800" y2="700"/>
  </g>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#00ff99" font-size="20" font-weight="bold" filter="url(#glow)" letter-spacing="4">TICKETFLOW</text>
  <text x="450" y="58" text-anchor="middle" fill="#4a6fa5" font-size="11" letter-spacing="6">SUPERVISOR ROUTING ARCHITECTURE</text>

  <!-- ── START node ── -->
  <rect x="370" y="80" width="160" height="44" rx="22" fill="none" stroke="#00ff99" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="107" text-anchor="middle" fill="#00ff99" font-size="13" font-weight="bold" letter-spacing="2">START</text>

  <!-- START → SUPERVISOR arrow -->
  <line x1="450" y1="124" x2="450" y2="164" stroke="#00ff99" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="462" y="148" fill="#4a6fa5" font-size="9" letter-spacing="1">user_input</text>

  <!-- ── SUPERVISOR node ── -->
  <rect x="300" y="164" width="300" height="64" rx="6" fill="#0d1f3c" stroke="#00aaff" stroke-width="2.5" filter="url(#glow)"/>
  <text x="450" y="188" text-anchor="middle" fill="#00aaff" font-size="10" letter-spacing="3">NODE</text>
  <text x="450" y="210" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" letter-spacing="1">SUPERVISOR</text>

  <!-- Supervisor label -->
  <text x="450" y="243" text-anchor="middle" fill="#4a6fa5" font-size="9" letter-spacing="2">LLM classifies intent → routes via Command(goto=...)</text>

  <!-- ── Fan-out arrows from Supervisor ── -->
  <!-- to BillingAgent -->
  <line x1="330" y1="228" x2="130" y2="330" stroke="#00ff99" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="195" y="278" fill="#00ff99" font-size="9" transform="rotate(-30, 195, 278)" letter-spacing="1">billing</text>

  <!-- to TechAgent -->
  <line x1="400" y1="228" x2="290" y2="330" stroke="#00ff99" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="325" y="284" fill="#00ff99" font-size="9" transform="rotate(-15, 325, 284)" letter-spacing="1">tech</text>

  <!-- to PolicyAgent -->
  <line x1="450" y1="228" x2="450" y2="330" stroke="#00ff99" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="462" y="284" fill="#00ff99" font-size="9" letter-spacing="1">policy</text>

  <!-- to EscalateAgent -->
  <line x1="510" y1="228" x2="610" y2="330" stroke="#00ff99" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="567" y="278" fill="#00ff99" font-size="9" transform="rotate(15, 567, 278)" letter-spacing="1">escalate</text>

  <!-- to END direct -->
  <line x1="575" y1="228" x2="780" y2="330" stroke="#ff4466" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,4"/>
  <text x="700" y="272" fill="#ff4466" font-size="9" transform="rotate(28, 700, 272)" letter-spacing="1">resolved</text>

  <!-- ── Agent nodes (row) ── -->

  <!-- BillingAgent -->
  <rect x="40" y="330" width="160" height="70" rx="5" fill="#0d1f0d" stroke="#00cc66" stroke-width="2"/>
  <text x="120" y="354" text-anchor="middle" fill="#00cc66" font-size="9" letter-spacing="2">AGENT</text>
  <text x="120" y="372" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Billing</text>
  <text x="120" y="390" text-anchor="middle" fill="#4a6fa5" font-size="8">refund · invoice · plan</text>

  <!-- TechAgent -->
  <rect x="215" y="330" width="160" height="70" rx="5" fill="#0d1a2e" stroke="#4499ff" stroke-width="2"/>
  <text x="295" y="354" text-anchor="middle" fill="#4499ff" font-size="9" letter-spacing="2">AGENT</text>
  <text x="295" y="372" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Tech Support</text>
  <text x="295" y="390" text-anchor="middle" fill="#4a6fa5" font-size="8">bug · outage · integration</text>

  <!-- PolicyAgent -->
  <rect x="390" y="330" width="160" height="70" rx="5" fill="#1e1a0d" stroke="#ffcc00" stroke-width="2"/>
  <text x="470" y="354" text-anchor="middle" fill="#ffcc00" font-size="9" letter-spacing="2">AGENT</text>
  <text x="470" y="372" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Policy</text>
  <text x="470" y="390" text-anchor="middle" fill="#4a6fa5" font-size="8">ToS · compliance · SLA</text>

  <!-- EscalateAgent -->
  <rect x="565" y="330" width="160" height="70" rx="5" fill="#1e0d0d" stroke="#ff6644" stroke-width="2"/>
  <text x="645" y="354" text-anchor="middle" fill="#ff6644" font-size="9" letter-spacing="2">AGENT</text>
  <text x="645" y="372" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Escalation</text>
  <text x="645" y="390" text-anchor="middle" fill="#4a6fa5" font-size="8">urgent · VIP · human hand-off</text>

  <!-- ── Tool nodes ── -->
  <!-- Billing tools -->
  <rect x="50" y="450" width="60" height="30" rx="3" fill="#0a150a" stroke="#00cc66" stroke-width="1"/>
  <text x="80" y="470" text-anchor="middle" fill="#00cc66" font-size="8">refund()</text>
  <rect x="125" y="450" width="60" height="30" rx="3" fill="#0a150a" stroke="#00cc66" stroke-width="1"/>
  <text x="155" y="470" text-anchor="middle" fill="#00cc66" font-size="8">invoice()</text>

  <!-- Tech tools -->
  <rect x="220" y="450" width="65" height="30" rx="3" fill="#0a1020" stroke="#4499ff" stroke-width="1"/>
  <text x="252" y="470" text-anchor="middle" fill="#4499ff" font-size="8">log_bug()</text>
  <rect x="300" y="450" width="65" height="30" rx="3" fill="#0a1020" stroke="#4499ff" stroke-width="1"/>
  <text x="332" y="470" text-anchor="middle" fill="#4499ff" font-size="8">status()</text>

  <!-- Policy tools -->
  <rect x="400" y="450" width="65" height="30" rx="3" fill="#15120a" stroke="#ffcc00" stroke-width="1"/>
  <text x="432" y="470" text-anchor="middle" fill="#ffcc00" font-size="8">lookup()</text>
  <rect x="478" y="450" width="65" height="30" rx="3" fill="#15120a" stroke="#ffcc00" stroke-width="1"/>
  <text x="510" y="470" text-anchor="middle" fill="#ffcc00" font-size="8">sla_check()</text>

  <!-- Escalation tools -->
  <rect x="575" y="450" width="65" height="30" rx="3" fill="#150a0a" stroke="#ff6644" stroke-width="1"/>
  <text x="607" y="470" text-anchor="middle" fill="#ff6644" font-size="8">page_human()</text>
  <rect x="655" y="450" width="65" height="30" rx="3" fill="#150a0a" stroke="#ff6644" stroke-width="1"/>
  <text x="687" y="470" text-anchor="middle" fill="#ff6644" font-size="8">notify()</text>

  <!-- Agent → Tool arrows -->
  <line x1="100" y1="400" x2="85" y2="450" stroke="#00cc66" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="135" y1="400" x2="155" y2="450" stroke="#00cc66" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="275" y1="400" x2="258" y2="450" stroke="#4499ff" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="315" y1="400" x2="330" y2="450" stroke="#4499ff" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="450" y1="400" x2="435" y2="450" stroke="#ffcc00" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="490" y1="400" x2="510" y2="450" stroke="#ffcc00" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="625" y1="400" x2="610" y2="450" stroke="#ff6644" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="665" y1="400" x2="685" y2="450" stroke="#ff6644" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- ── Return arrows back to supervisor ── -->
  <path d="M120,330 Q120,295 300,228" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-ret)" stroke-dasharray="3,4"/>
  <path d="M295,330 Q295,295 390,228" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-ret)" stroke-dasharray="3,4"/>
  <path d="M470,330 Q470,295 470,228" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-ret)" stroke-dasharray="3,4"/>
  <path d="M645,330 Q645,295 530,228" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-ret)" stroke-dasharray="3,4"/>

  <!-- return label -->
  <text x="165" y="295" fill="#555" font-size="8" letter-spacing="1">result → supervisor</text>

  <!-- ── END node ── -->
  <rect x="720" y="330" width="140" height="70" rx="22" fill="none" stroke="#ff4466" stroke-width="2" filter="url(#glow)"/>
  <text x="790" y="360" text-anchor="middle" fill="#ff4466" font-size="10" letter-spacing="2">TERMINAL</text>
  <text x="790" y="381" text-anchor="middle" fill="#ff4466" font-size="15" font-weight="bold">END</text>
  <text x="790" y="395" text-anchor="middle" fill="#4a6fa5" font-size="8">final response</text>

  <!-- ── Shared state box ── -->
  <rect x="30" y="550" width="840" height="90" rx="5" fill="#0d1120" stroke="#2a3a60" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="450" y="572" text-anchor="middle" fill="#4a6fa5" font-size="9" letter-spacing="3">SHARED STATE  —  AgentState (TypedDict)</text>

  <text x="70"  y="596" fill="#888" font-size="9">user_input: str</text>
  <text x="70"  y="614" fill="#888" font-size="9">intent: str</text>
  <text x="70"  y="632" fill="#888" font-size="9">retry_count: int</text>

  <text x="240" y="596" fill="#00cc66" font-size="9">billing_result: str</text>
  <text x="240" y="614" fill="#4499ff" font-size="9">tech_result: str</text>
  <text x="240" y="632" fill="#ffcc00" font-size="9">policy_result: str</text>

  <text x="420" y="596" fill="#ff6644" font-size="9">escalation_result: str</text>
  <text x="420" y="614" fill="#888" font-size="9">error: Optional[str]</text>
  <text x="420" y="632" fill="#888" font-size="9">messages: Annotated[list, add_messages]</text>

  <text x="680" y="596" fill="#888" font-size="9">active_agent: str</text>
  <text x="680" y="614" fill="#888" font-size="9">final_response: str</text>
  <text x="680" y="632" fill="#888" font-size="9">resolved: bool</text>

  <!-- ── Legend ── -->
  <line x1="30" y1="660" x2="55" y2="660" stroke="#00ff99" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="62" y="664" fill="#888" font-size="8">supervisor route</text>
  <line x1="160" y1="660" x2="185" y2="660" stroke="#555" stroke-width="1.2" stroke-dasharray="3,4"/>
  <text x="192" y="664" fill="#888" font-size="8">return to supervisor</text>
  <line x1="320" y1="660" x2="345" y2="660" stroke="#ff4466" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="352" y="664" fill="#888" font-size="8">direct to END</text>
  <rect x="455" y="653" width="10" height="10" rx="2" fill="none" stroke="#00aaff" stroke-width="1.5"/>
  <text x="470" y="664" fill="#888" font-size="8">supervisor node</text>
  <rect x="575" y="653" width="10" height="10" rx="2" fill="none" stroke="#00cc66" stroke-width="1.5"/>
  <text x="590" y="664" fill="#888" font-size="8">specialized agent</text>
  <rect x="700" y="653" width="10" height="10" rx="2" fill="none" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="715" y="664" fill="#888" font-size="8">tool</text>
</svg>